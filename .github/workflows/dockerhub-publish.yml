name: Build and Push Docker Image

"on":
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/dockerhub-publish.yml'
    

permissions:
  contents: write

env:
  IMAGE_NAME: shalindra936/diabetes-prediction-model
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Update k8s image tag
        run: |
          set -euo pipefail
          sed -i "s|image: .*|image: ${IMAGE_NAME}:${IMAGE_TAG}|" k8s/deployment.yaml

      - name: Commit k8s image tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update k8s image tag to ${IMAGE_TAG}"
          git push
