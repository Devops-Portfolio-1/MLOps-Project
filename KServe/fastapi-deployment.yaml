apiVersion: apps/v1
kind: Deployment
metadata:
  name: diabetes-fastapi
  labels:
    app: diabetes-fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diabetes-fastapi
  template:
    metadata:
      labels:
        app: diabetes-fastapi
    spec:
      containers:
        - name: fastapi
          image: shalindra936/diabetes-prediction-model:34
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: KSERVE_PREDICTOR_URL
              value: "http://diabetes-sklearn-predictor.default.svc.cluster.local/v1/models/diabetes-sklearn:predict"
          readinessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001"]
---
apiVersion: v1
kind: Service
metadata:
  name: diabetes-fastapi
  labels:
    app: diabetes-fastapi
spec:
  selector:
    app: diabetes-fastapi
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8001
  type: LoadBalancer
